<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F1318"/>
      <stop offset="100%" stop-color="#080A0F"/>
    </linearGradient>
    <linearGradient id="arc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3DD9A0"/>
      <stop offset="50%" stop-color="#4FC3A1"/>
      <stop offset="100%" stop-color="#3BB890"/>
    </linearGradient>
    <linearGradient id="mFill" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#D0D8E4"/>
    </linearGradient>
    <linearGradient id="streaks" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F0C34E"/>
      <stop offset="100%" stop-color="#F07A3A"/>
    </linearGradient>
    <filter id="arcGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="28"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="512" cy="400" rx="340" ry="260" fill="#4FC3A1" opacity="0.045"/>

  <!-- Background arc track -->
  <path d="M 230 540 A 320 320 0 0 1 512 100 A 320 320 0 0 1 794 540"
    fill="none" stroke="#4FC3A1" stroke-width="32" stroke-linecap="round" opacity="0.08"/>

  <!-- Outer glow behind active arc -->
  <g filter="url(#softGlow)" opacity="0.35">
    <path d="M 230 540 A 320 320 0 0 1 512 100 A 320 320 0 0 1 794 540"
      fill="none" stroke="#4FC3A1" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Active power arc -->
  <g filter="url(#arcGlow)">
    <path d="M 248 530 A 306 306 0 0 1 512 112 A 306 306 0 0 1 776 530"
      fill="none" stroke="url(#arc)" stroke-width="30" stroke-linecap="round" opacity="0.92"/>
  </g>

  <!-- Arc tick marks -->
  <g stroke="#4FC3A1" stroke-width="4" opacity="0.3" stroke-linecap="round">
    <line x1="316" y1="218" x2="334" y2="238"/>
    <line x1="512" y1="108" x2="512" y2="134"/>
    <line x1="708" y1="218" x2="690" y2="238"/>
  </g>

  <!-- Power dot at arc end -->
  <circle cx="776" cy="530" r="16" fill="#4FC3A1" opacity="0.85"/>
  <circle cx="776" cy="530" r="7" fill="#FFFFFF" opacity="0.95"/>

  <!-- The M letterform — bold, geometric -->
  <path d="
    M 232 780
    L 232 390
    Q 240 370 254 388
    L 456 640
    L 498 698
    L 512 718
    L 526 698
    L 568 640
    L 770 388
    Q 784 370 792 390
    L 792 780
    L 690 780
    L 690 560
    L 544 740
    Q 528 762 512 762
    Q 496 762 480 740
    L 334 560
    L 334 780
    Z
  " fill="url(#mFill)" opacity="0.95"/>

  <!-- Speed streaks — left side motion indicator -->
  <g stroke="url(#streaks)" stroke-linecap="round" opacity="0.45">
    <line x1="110" y1="450" x2="196" y2="450" stroke-width="5.5"/>
    <line x1="126" y1="500" x2="202" y2="500" stroke-width="4.5"/>
    <line x1="118" y1="550" x2="198" y2="550" stroke-width="5"/>
  </g>
</svg>
